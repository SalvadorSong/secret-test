<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBS Balance Music Game - Demo 1: Sit-Stand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #heading {
      text-align: center;
      padding: 20px;
    }
    #heading h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #e94560;
    }
    #heading p {
      font-size: 14px;
      color: #aaa;
    }
    #startBtn {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
    }
    #startBtn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    #gameArea {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #videoCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #videoCanvas.front-camera {
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #overlay.front-camera {
      transform: scaleX(-1);
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      min-width: 200px;
    }
    #hud .label { color: #aaa; }
    #hud .value { color: #e94560; font-weight: bold; font-size: 18px; }
    #tree {
      position: absolute;
      bottom: 80px;
      right: 30px;
      z-index: 10;
      text-align: center;
      font-size: 60px;
    }
    #musicFeedback {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.6);
      padding: 10px 25px;
      border-radius: 20px;
      font-size: 18px;
      color: #4ecca3;
    }
  </style>
</head>
<body>

  <div id="heading">
    <h1>BBS Balance Music Game</h1>
    <p>Demo 1: Sit-Stand Rhythm Tree</p>
    <p style="margin-top:8px; color:#4ecca3;">Stand up and sit down to play music!</p>
    <button id="startBtn" disabled>Loading Model...</button>
    <p id="debugInfo" style="margin-top:15px; color:#e94560; font-size:14px;">Initializing...</p>
  </div>

  <div id="gameArea">
    <video id="videoCanvas" playsinline autoplay muted width="640" height="480"></video>
    <canvas id="overlay"></canvas>

    <div id="hud">
      <div><span class="label">State: </span><span class="value" id="stateDisplay">--</span></div>
      <div><span class="label">Transitions: </span><span class="value" id="transCount">0</span></div>
      <div><span class="label">Stand Time: </span><span class="value" id="standTime">0.0s</span></div>
      <div><span class="label">Sit Time: </span><span class="value" id="sitTime">0.0s</span></div>
      <div><span class="label">Stability: </span><span class="value" id="stability">--</span></div>
      <div style="margin-top:8px"><span class="label">Hip Angle: </span><span class="value" id="hipAngle">--</span></div>
      <div><span class="label">Knee Angle: </span><span class="value" id="kneeAngle">--</span></div>
    </div>

    <div id="tree">🌱</div>
    <button id="switchCamBtn" style="position:absolute;top:10px;right:10px;z-index:10;padding:8px 15px;border:none;border-radius:8px;background:#e94560;color:white;font-size:14px;cursor:pointer;">Switch Camera</button>
    <div id="musicFeedback">Ready...</div>
  </div>

  <!-- Tone.js for audio -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <!-- MediaPipe Pose -->
  <script type="module">
    import { PoseLandmarker, FilesetResolver, DrawingUtils } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    // ============ STATE ============
    let poseLandmarker;
    let video, canvas, ctx, drawingUtils;
    let lastVideoTime = -1;
    let animationId;

    // Game state
    let currentState = "unknown";
    let previousState = "unknown";
    let transitionCount = 0;
    let standStartTime = 0;
    let sitStartTime = 0;
    let totalStandTime = 0;
    let totalSitTime = 0;
    let hipHistory = [];
    let gameStarted = false;

    // Audio
    let synth, bassSynth, chordSynth;
    let scaleNotes = ["C4","D4","E4","F4","G4","A4","B4","C5"];
    let noteIndex = 0;
    let lastNoteTime = 0;

    // ============ DEBUG ============
    function debugLog(msg) {
      const el = document.getElementById("debugInfo");
      if (el) el.textContent = msg;
      const mf = document.getElementById("musicFeedback");
      if (mf) mf.textContent = msg;
      console.log("[BBS] " + msg);
    }

    // ============ INIT MODEL ============
    async function initPose() {
      try {
        debugLog("Loading WASM...");
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
        );
        debugLog("Loading model...");
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
          },
          runningMode: "VIDEO",
          numPoses: 1
        });
        debugLog("Model ready!");
        document.getElementById("startBtn").disabled = false;
        document.getElementById("startBtn").textContent = "Start Game";
      } catch(e) {
        debugLog("Error: " + e.message);
        console.error(e);
      }
    }
    initPose();

    // ============ INIT AUDIO ============
    function initAudio() {
      synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.05, decay: 0.3, sustain: 0.4, release: 0.8 }
      }).toDestination();
      synth.volume.value = -6;

      bassSynth = new Tone.Synth({
        oscillator: { type: "sine" },
        envelope: { attack: 0.1, decay: 0.4, sustain: 0.5, release: 1.0 }
      }).toDestination();
      bassSynth.volume.value = -10;

      chordSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.2, decay: 0.5, sustain: 0.3, release: 1.5 }
      }).toDestination();
      chordSynth.volume.value = -12;
    }

    // ============ CAMERA ============
    let useFrontCamera = true;
    async function startCamera() {
      video = document.getElementById("videoCanvas");
      canvas = document.getElementById("overlay");
      ctx = canvas.getContext("2d");
      drawingUtils = new DrawingUtils(ctx);

      try {
        debugLog("Opening " + (useFrontCamera ? "front" : "rear") + " camera...");
        const facingMode = useFrontCamera ? "user" : "environment";
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: { exact: facingMode }
          }
        }).catch(() => {
          // Fallback: if exact fails, try without exact constraint
          debugLog("Exact camera failed, trying fallback...");
          return navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 640 },
              height: { ideal: 480 },
              facingMode: facingMode
            }
          });
        });

        // Attach listener BEFORE setting srcObject to avoid race condition
        video.addEventListener("loadeddata", function onVideoReady() {
          video.removeEventListener("loadeddata", onVideoReady);
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          debugLog("Video ready: " + video.videoWidth + "x" + video.videoHeight + " | Detecting...");
          detectPose();
        });

        video.srcObject = stream;
        // Mirror front camera (selfie view)
        if (useFrontCamera) {
          video.classList.add("front-camera");
          canvas.classList.add("front-camera");
        } else {
          video.classList.remove("front-camera");
          canvas.classList.remove("front-camera");
        }

        // Explicitly play — don't rely on autoplay attribute (mobile may ignore it)
        await video.play();
        debugLog("Camera opened and playing!");
      } catch(e) {
        debugLog("Camera error: " + e.message);
        console.error(e);
      }
    }

    // Switch camera
    async function switchCamera() {
      useFrontCamera = !useFrontCamera;
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      if (video && video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
      }
      lastVideoTime = -1;
      startCamera();
    }
    // Bind switch camera button
    document.getElementById("switchCamBtn").addEventListener("click", () => {
      debugLog("Switching camera...");
      switchCamera();
    });

    // ============ ANGLE CALCULATION ============
    function calcAngle(a, b, c) {
      const ab = { x: a.x - b.x, y: a.y - b.y };
      const cb = { x: c.x - b.x, y: c.y - b.y };
      const dot = ab.x * cb.x + ab.y * cb.y;
      const magAB = Math.sqrt(ab.x * ab.x + ab.y * ab.y);
      const magCB = Math.sqrt(cb.x * cb.x + cb.y * cb.y);
      if (magAB === 0 || magCB === 0) return 0;
      const cosAngle = Math.max(-1, Math.min(1, dot / (magAB * magCB)));
      return Math.acos(cosAngle) * (180 / Math.PI);
    }

    // ============ DETECT SIT/STAND ============
    function detectSitStand(landmarks) {
      const leftShoulder = landmarks[11];
      const rightShoulder = landmarks[12];
      const leftHip = landmarks[23];
      const rightHip = landmarks[24];
      const leftKnee = landmarks[25];
      const rightKnee = landmarks[26];
      const leftAnkle = landmarks[27];
      const rightAnkle = landmarks[28];

      const hip = { x: (leftHip.x + rightHip.x)/2, y: (leftHip.y + rightHip.y)/2 };
      const knee = { x: (leftKnee.x + rightKnee.x)/2, y: (leftKnee.y + rightKnee.y)/2 };
      const shoulder = { x: (leftShoulder.x + rightShoulder.x)/2, y: (leftShoulder.y + rightShoulder.y)/2 };
      const ankle = { x: (leftAnkle.x + rightAnkle.x)/2, y: (leftAnkle.y + rightAnkle.y)/2 };

      const kneeAng = calcAngle(hip, knee, ankle);
      const hipAng = calcAngle(shoulder, hip, knee);

      document.getElementById("hipAngle").textContent = hipAng.toFixed(1) + "°";
      document.getElementById("kneeAngle").textContent = kneeAng.toFixed(1) + "°";

      hipHistory.push({ x: hip.x, y: hip.y, t: performance.now() });
      if (hipHistory.length > 30) hipHistory.shift();

      let newState;
      if (hipAng > 160) {
        newState = "standing";
      } else if (hipAng < 120) {
        newState = "sitting";
      } else {
        newState = "transitioning";
      }

      return { state: newState, kneeAngle: kneeAng, hipAngle: hipAng, hip, knee, shoulder, ankle };
    }

    // ============ STABILITY ============
    function calcStability() {
      if (hipHistory.length < 10) return "...";
      const recent = hipHistory.slice(-15);
      const avgX = recent.reduce((s,p) => s + p.x, 0) / recent.length;
      const avgY = recent.reduce((s,p) => s + p.y, 0) / recent.length;
      const variance = recent.reduce((s,p) => s + Math.pow(p.x-avgX,2) + Math.pow(p.y-avgY,2), 0) / recent.length;
      const sway = Math.sqrt(variance) * 1000;
      if (sway < 2) return "Excellent";
      if (sway < 5) return "Good";
      if (sway < 10) return "Fair";
      return "Unstable";
    }

    // ============ MUSIC TRIGGERS ============
    function onStandUp() {
      const now = Tone.now();
      for (let i = 0; i < 5; i++) {
        const note = scaleNotes[(noteIndex + i) % scaleNotes.length];
        synth.triggerAttackRelease(note, "8n", now + i * 0.12);
      }
      noteIndex = (noteIndex + 2) % scaleNotes.length;
      bassSynth.triggerAttackRelease("C2", "2n", now);
      document.getElementById("musicFeedback").textContent = "Stand Up!";
      document.getElementById("musicFeedback").style.color = "#4ecca3";
    }

    function onSitDown() {
      const now = Tone.now();
      for (let i = 0; i < 5; i++) {
        const note = scaleNotes[(noteIndex + 4 - i) % scaleNotes.length];
        synth.triggerAttackRelease(note, "8n", now + i * 0.12);
      }
      chordSynth.triggerAttackRelease(["E3","G3","B3"], "2n", now);
      document.getElementById("musicFeedback").textContent = "Sit Down";
      document.getElementById("musicFeedback").style.color = "#e94560";
    }

    function playStabilityTone(stability) {
      const now = performance.now();
      if (now - lastNoteTime < 2000) return;
      lastNoteTime = now;
      if (stability === "Excellent" || stability === "Good") {
        chordSynth.triggerAttackRelease(["C4","E4","G4"], "4n");
      }
    }

    // ============ TREE VISUAL ============
    function updateTree() {
      const treeEl = document.getElementById("tree");
      if (transitionCount === 0) treeEl.textContent = "🌱";
      else if (transitionCount < 4) treeEl.textContent = "🌿";
      else if (transitionCount < 8) treeEl.textContent = "🌳";
      else if (transitionCount < 12) treeEl.textContent = "🌳🌸";
      else treeEl.textContent = "🌳🌸🌸🌸";
    }

    // ============ MAIN LOOP ============
    let frameCount = 0;
    let detectCount = 0;
    async function detectPose() {
      // Always schedule next frame FIRST so the loop never dies
      animationId = requestAnimationFrame(detectPose);

      // Guard: wait until video has frame data
      if (!poseLandmarker || !video || video.readyState < 2) return;

      const now = performance.now();
      if (lastVideoTime === video.currentTime) return;
      lastVideoTime = video.currentTime;
      frameCount++;

      try {
        const results = poseLandmarker.detectForVideo(video, now);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (frameCount % 30 === 0 && detectCount === 0) {
          debugLog("Frames: " + frameCount + " | No body detected - show full body");
        }

        if (results.landmarks && results.landmarks.length > 0) {
          detectCount++;
          if (detectCount === 1) {
            debugLog("Body detected!");
          }
          const landmarks = results.landmarks[0];

          drawingUtils.drawLandmarks(landmarks, {
            radius: 4,
            color: "#4ecca3",
            fillColor: "#4ecca3"
          });
          drawingUtils.drawConnectors(landmarks, PoseLandmarker.POSE_CONNECTIONS, {
            color: "#e94560",
            lineWidth: 2
          });

          const detection = detectSitStand(landmarks);

          previousState = currentState;
          if (detection.state !== "transitioning") {
            currentState = detection.state;
          }

          document.getElementById("stateDisplay").textContent =
            currentState === "standing" ? "Standing" :
            currentState === "sitting" ? "Sitting" : "...";

          if (previousState === "sitting" && currentState === "standing") {
            transitionCount++;
            standStartTime = now;
            if (sitStartTime > 0) {
              totalSitTime += (now - sitStartTime) / 1000;
            }
            onStandUp();
            updateTree();
          } else if (previousState === "standing" && currentState === "sitting") {
            transitionCount++;
            sitStartTime = now;
            if (standStartTime > 0) {
              totalStandTime += (now - standStartTime) / 1000;
            }
            onSitDown();
            updateTree();
          }

          if (currentState === "standing" && standStartTime > 0) {
            const t = totalStandTime + (now - standStartTime) / 1000;
            document.getElementById("standTime").textContent = t.toFixed(1) + "s";
          }
          if (currentState === "sitting" && sitStartTime > 0) {
            const t = totalSitTime + (now - sitStartTime) / 1000;
            document.getElementById("sitTime").textContent = t.toFixed(1) + "s";
          }

          const stab = calcStability();
          document.getElementById("stability").textContent = stab;
          if (currentState === "standing") {
            playStabilityTone(stab);
          }

          document.getElementById("transCount").textContent = transitionCount;
        }
      } catch(e) {
        console.error("[BBS] Detection error:", e);
        debugLog("Detection error: " + e.message);
      }
    }

    // ============ START BUTTON ============
    document.getElementById("startBtn").addEventListener("click", async () => {
      await Tone.start();
      initAudio();
      document.getElementById("heading").style.display = "none";
      document.getElementById("gameArea").style.display = "block";
      gameStarted = true;
      sitStartTime = performance.now();
      startCamera();
    });

  </script>
</body>
</html>
